<style>
  :root {
    --gold:       #f4d35e;
    --gold-deep:  #d4a13a;
    --parchment:  #e8d6a8;
    --ink:        #0a0807;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--ink);
    color: var(--gold);
    font-family: 'Cinzel', 'Trajan Pro', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Background painting — aspect-preserved, centered, with blurred
     "cover-fit" version behind it filling any letterbox bars. */
  #bg {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    filter: brightness(0.85) contrast(1.04) saturate(1.06);
  }

  /* Vignette + top/bottom darken so text reads */
  #vignette {
    position: fixed; inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.55) 95%),
      linear-gradient(to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.10) 22%,
        rgba(0,0,0,0.10) 78%,
        rgba(0,0,0,0.55) 100%);
  }

  /* Canvas where the colored-ASCII countdown is drawn */
  #overlay {
    position: fixed; inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* UI text (title + footer) */
  .ui {
    position: fixed;
    left: 0; right: 0;
    text-align: center;
    z-index: 3;
    pointer-events: none;
    text-shadow:
      0 2px 6px rgba(0,0,0,0.95),
      0 0 22px rgba(244,211,94,0.20);
  }

  #title { top: 5vh; }
  #title .eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(11px, 1.3vw, 16px);
    letter-spacing: 0.55em;
    color: var(--parchment);
    opacity: 0.72;
    margin-bottom: 0.7em;
    padding-left: 0.55em; /* compensate trailing letter-spacing */
  }
  #title .line1 {
    font-weight: 900;
    font-size: clamp(22px, 3.6vw, 56px);
    letter-spacing: 0.34em;
    color: var(--gold);
    padding-left: 0.34em;
  }
  #title .line2 {
    font-weight: 700;
    font-size: clamp(14px, 2.2vw, 30px);
    letter-spacing: 0.52em;
    color: var(--gold-deep);
    margin-top: 0.55em;
    padding-left: 0.52em;
  }
  #title .rule {
    margin: 1.1em auto 0;
    width: clamp(120px, 18vw, 280px);
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(244,211,94,0.55), transparent);
  }

  #footer { bottom: 5vh; }
  #footer .ornament-top {
    margin: 0 auto 0.9em;
    width: clamp(120px, 16vw, 240px);
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(244,211,94,0.5), transparent);
  }
  #footer .target {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(15px, 1.9vw, 24px);
    letter-spacing: 0.42em;
    color: var(--gold);
    padding-left: 0.42em;
  }
  #footer .sub {
    margin-top: 0.5em;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(11px, 1.2vw, 15px);
    letter-spacing: 0.34em;
    color: var(--parchment);
    opacity: 0.62;
    padding-left: 0.34em;
  }

  /* Film grain */
  #grain {
    position: fixed; inset: 0;
    z-index: 4;
    pointer-events: none;
    opacity: 0.07;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='3' seed='5'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* Subtle breathing on the title to feel alive */
  @keyframes breathe {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.92; }
  }
  #title .line1 { animation: breathe 6s ease-in-out infinite; }

  @media (max-width: 640px) {
    #title  { top: 3.5vh; }
    #footer { bottom: 3.5vh; }
    #title .eyebrow { letter-spacing: 0.4em; }
    #title .line1   { letter-spacing: 0.22em; }
    #title .line2   { letter-spacing: 0.4em; }
    #footer .target { letter-spacing: 0.3em; }
  }
</style>

    const img = new Image();
    img.crossOrigin = 'anonymous';

    let bgPixels = null;
    let dpr      = window.devicePixelRatio || 1;
    let canvasTainted = false;
    let focalX = 0, focalY = 0, focalW = 0, focalH = 0;

    function resize() {
      dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth;
      const h = window.innerHeight;

      [bgCanvas, overlayCanvas].forEach(c => {
        c.width  = Math.max(1, Math.floor(w * dpr));
        c.height = Math.max(1, Math.floor(h * dpr));
        c.style.width  = w + 'px';
        c.style.height = h + 'px';
      });

      bgCtx.imageSmoothingEnabled = true;
      bgCtx.imageSmoothingQuality = 'high';

      if (img.complete && img.naturalWidth > 0) {
        const cw = bgCanvas.width;
        const ch = bgCanvas.height;
        bgCtx.clearRect(0, 0, cw, ch);

        const imgAR  = img.naturalWidth / img.naturalHeight;
        const viewAR = cw / ch;

        // 1. Blurred cover-fit background fills any letterbox bars.
        let coverW, coverH;
        if (imgAR > viewAR) {
          coverH = ch; coverW = ch * imgAR;
        } else {
          coverW = cw; coverH = cw / imgAR;
        }
        const coverX = (cw - coverW) / 2;
        const coverY = (ch - coverH) / 2;

        const blurPx = Math.max(8, Math.round(Math.min(cw, ch) * 0.045));
        bgCtx.save();
        bgCtx.filter = `blur(${blurPx}px) brightness(0.55) saturate(1.15)`;
        bgCtx.drawImage(img, coverX, coverY, coverW, coverH);
        bgCtx.restore();

        // Soft dim over the blurred bars so the focal image pops.
        bgCtx.fillStyle = 'rgba(8, 6, 4, 0.30)';
        bgCtx.fillRect(0, 0, cw, ch);

        // 2. Centered focal image at its true aspect ratio.
        let fitW, fitH;
        if (imgAR > viewAR) {
          fitW = cw; fitH = cw / imgAR;
        } else {
          fitW = ch * imgAR; fitH = ch;
        }
        focalX = (cw - fitW) / 2;
        focalY = (ch - fitH) / 2;
        focalW = fitW;
        focalH = fitH;

        bgCtx.drawImage(img, focalX, focalY, fitW, fitH);
      }

      try {
        bgPixels = bgCtx.getImageData(0, 0, bgCanvas.width, bgCanvas.height);
        canvasTainted = false;
      } catch (e) {
        canvasTainted = true;
        bgPixels = null;
        console.warn('Canvas is tainted (likely opened via file://). ' +
                     'Serve over http (e.g. `python -m http.server`) for pixel-sampled colors.');
      }
      draw();
    }

    function sampleColor(xCss, yCss) {
      if (!bgPixels) {
        // Fallback palette interpolated across the screen for variety.
        const t = xCss / Math.max(1, window.innerWidth);
        const r = Math.round(244 - 60 * t);
        const g = Math.round(180 + 30 * t);
        const b = Math.round( 60 + 50 * t);
        return [r, g, b];
      }
      const x = Math.max(0, Math.min(bgPixels.width  - 1, Math.floor(xCss * dpr)));
      const y = Math.max(0, Math.min(bgPixels.height - 1, Math.floor(yCss * dpr)));
      const i = (y * bgPixels.width + x) * 4;
      return [bgPixels.data[i], bgPixels.data[i + 1], bgPixels.data[i + 2]];
    }

    function enhance(rgb) {
      let [r, g, b] = rgb;
      // Boost saturation
      const avg = (r + g + b) / 3;
      const sat = 1.65;
      r = avg + (r - avg) * sat;
      g = avg + (g - avg) * sat;
      b = avg + (b - avg) * sat;
      // Lift overall brightness
      const lift = 1.45;
      r *= lift; g *= lift; b *= lift;
      // Ensure a minimum luminance so very dark pixels still glow
      const minLum = 95;
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      if (lum < minLum) {
        const add = (minLum - lum) * 0.75;
        r += add; g += add; b += add;
      }
      return [
        Math.max(0, Math.min(255, Math.round(r))),
        Math.max(0, Math.min(255, Math.round(g))),
        Math.max(0, Math.min(255, Math.round(b))),
      ];
    }

    function buildTexts() {
      const now = new Date();
      let diff = TARGET - now;
      if (diff < 0) diff = 0;
      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff %  86400000) / 3600000);
      const minutes = Math.floor((diff %   3600000) /   60000);
      const seconds = Math.floor((diff %     60000) /    1000);
      const pad = n => String(n).padStart(2, '0');
      return {
        single: `${days} DAYS ${pad(hours)}H ${pad(minutes)}M ${pad(seconds)}S`,
        top:    `${days} DAYS`,
        bot:    `${pad(hours)}H ${pad(minutes)}M ${pad(seconds)}S`,
      };
    }

    function buildGrid(text) {
      const rows = FONT_H;
      const glyphs = [];
      let totalCols = 0;
      for (const ch of text) {
        const g = FONT[ch] || FONT[' '];
        glyphs.push(g);
        totalCols += g[0].length + 1; // +1 column inter-glyph spacing
      }
      totalCols -= 1; // no trailing spacing
      const grid = Array.from({ length: rows }, () => new Uint8Array(totalCols));
      let col = 0;
      for (const g of glyphs) {
        const w = g[0].length;
        for (let r = 0; r < rows; r++) {
          const row = g[r];
          for (let c = 0; c < w; c++) {
            if (row[c] === '█') grid[r][col + c] = 1;
          }
        }
        col += w + 1;
      }
      return grid;
    }

    function drawGrid(grid, offX, offY, cell) {
      const rows = grid.length;
      const cols = grid[0].length;
      // Tiny gap between glyph-cells so the grid reads as discrete characters.
      const gap        = cell >= 8 ? 1 : 0;
      const drawable   = cell - gap;
      const subSize    = drawable / 2;            // each cell → 2×2 sub-cells
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (!grid[r][c]) continue;
          const cx = offX + c * cell;
          const cy = offY + r * cell;
          // 4 sub-cells, each sampled independently → doubles color resolution.
          for (let sr = 0; sr < 2; sr++) {
            for (let sc = 0; sc < 2; sc++) {
              const subX = cx + sc * subSize;
              const subY = cy + sr * subSize;
              const [red, green, blue] = enhance(
                sampleColor(subX + subSize / 2, subY + subSize / 2)
              );
              overlayCtx.fillStyle = `rgb(${red},${green},${blue})`;
              // Pixel-snapped rect so adjacent sub-cells share an edge with no gap.
              const x0 = Math.floor(subX * dpr);
              const y0 = Math.floor(subY * dpr);
              const x1 = Math.floor((subX + subSize) * dpr);
              const y1 = Math.floor((subY + subSize) * dpr);
              overlayCtx.fillRect(x0, y0, x1 - x0, y1 - y0);
            }
          }
        }
      }
    }

    function draw() {
      const texts = buildTexts();
      const wCss  = window.innerWidth;
      const hCss  = window.innerHeight;

      // Width/height budgets for the countdown block — kept moderate so the
      // clock sits over the cherubs without covering the figures below.
      const targetW = wCss * 0.66;
      const targetH = hCss * 0.22;

      const singleGrid = buildGrid(texts.single);
      const topGrid    = buildGrid(texts.top);
      const botGrid    = buildGrid(texts.bot);

      const cellSingle = Math.floor(Math.min(
        targetW / singleGrid[0].length,
        targetH /  FONT_H
      ));

      const lineGapFactor = 1.4; // gap between stacked lines = factor × cell
      const multiCols = Math.max(topGrid[0].length, botGrid[0].length);
      const cellMulti = Math.floor(Math.min(
        targetW / multiCols,
        targetH / (FONT_H * 2 + lineGapFactor)
      ));

      // Pick whichever layout yields physically bigger digits. Single-line wins
      // on very wide / short landscape screens; two-line wins on portrait & square.
      let lines, cell;
      if (cellMulti > cellSingle) {
        lines = [topGrid, botGrid];
        cell  = Math.max(2, cellMulti);
      } else {
        lines = [singleGrid];
        cell  = Math.max(2, cellSingle);
      }

      const lineGapPx = (lines.length > 1) ? Math.floor(cell * lineGapFactor) : 0;
      const totalH    = lines.length * FONT_H * cell + (lines.length - 1) * lineGapPx;
      // Anchor the clock in the upper third of the viewport so it floats over
      // the cherubs and sky, leaving the figures below uncovered.
      const offYStart = hCss * 0.30 - totalH / 2;

      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

      // Subtle soft drop shadow behind digits
      overlayCtx.shadowColor   = 'rgba(0,0,0,0.7)';
      overlayCtx.shadowBlur    = Math.max(1, cell * 0.35);
      overlayCtx.shadowOffsetX = 0;
      overlayCtx.shadowOffsetY = Math.max(1, cell * 0.05);

      let curY = offYStart;
      for (const grid of lines) {
        const gridW = cell * grid[0].length;
        const offX  = (wCss - gridW) / 2;
        drawGrid(grid, offX, curY, cell);
        curY += FONT_H * cell + lineGapPx;
      }

      overlayCtx.shadowColor = 'transparent';
      overlayCtx.shadowBlur  = 0;
    }

    function loop() {
      draw();
      requestAnimationFrame(loop);
    }

    img.onload = () => {
      resize();
      loop();
    };
    img.onerror = () => {
      console.error('Failed to load image.jpg');
      bgPixels = null;
      resize();
      loop();
    };
    img.src = IMG_DATA_URI;

    let _rt;
    window.addEventListener('resize', () => {
      clearTimeout(_rt);
      _rt = setTimeout(resize, 80);
    });
  })();
  </script>
